name: Generate Weekly Scripts

on:
  schedule:
    - cron: '17 12 * * 0'  # Sundays 8:17am ET (12:17 UTC)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Script Engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/hook_bank.json
          git add data/scripts_archive.json
          git diff --staged --quiet || git commit -m "chore: update data files $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
