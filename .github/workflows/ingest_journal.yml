name: Ingest Content Journal

on:
  schedule:
    - cron: '0 13,1 * * *'  # 8am and 8pm ET (1:00 and 13:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run journal ingest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.ingest_journal

      - name: Commit updated data files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/personal_topics_queue.json
          git add data/telegram_offset.json
          find data/journal -name '*.jsonl' -print -exec git add {} +
          git diff --staged --quiet || git commit -m "chore: journal ingest $(date +%Y-%m-%d-%H%M)"
          git push || echo "Nothing to push"
